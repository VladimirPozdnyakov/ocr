name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.40.1)'
        required: true
        default: '0.40.1'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build UI
        run: bun run --cwd ui build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/out

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build
        run: cargo build --release

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/out

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create package
        run: |
          mkdir -p dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64
          cp target/release/koharu dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64/
          cp -r ui/out dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64/ui
          cat > dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64/README.md << 'EOF'
          # Lilith Koharu ${{ steps.version.outputs.VERSION }} (Linux x86_64)

          OCR-приложение для манги с ML-ускорением.

          ## Запуск

          ```bash
          chmod +x koharu
          ./koharu
          ```

          Откройте http://127.0.0.1:3000 в браузере.

          ## Параметры

          ```bash
          ./koharu --help
          ./koharu --port 8080
          ./koharu --host 0.0.0.0 --port 8080  # доступ из сети
          ./koharu --cpu                       # только CPU
          ```

          ## Требования

          - Для GPU-ускорения: NVIDIA GPU с CUDA (compute capability 7.5+)
          - Драйверы NVIDIA

          При первом запуске модели загрузятся автоматически.

          ## Структура

          ```
          koharu  - исполняемый файл
          ui/     - веб-интерфейс
          ```
          EOF
          cd dist
          tar -czvf lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lilith-koharu-linux-x86_64
          path: dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-ui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build
        run: cargo build --release

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/out

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create package
        shell: bash
        run: |
          mkdir -p dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64
          cp target/release/koharu.exe dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64/
          cp -r ui/out dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64/ui
          cat > dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64/README.md << 'EOF'
          # Lilith Koharu ${{ steps.version.outputs.VERSION }} (Windows x86_64)

          OCR-приложение для манги с ML-ускорением.

          ## Запуск

          Дважды кликните на `koharu.exe` или запустите из командной строки:

          ```
          koharu.exe
          ```

          Откройте http://127.0.0.1:3000 в браузере.

          ## Параметры

          ```
          koharu.exe --help
          koharu.exe --port 8080
          koharu.exe --host 0.0.0.0 --port 8080
          koharu.exe --cpu
          ```

          ## Требования

          - Для GPU-ускорения: NVIDIA GPU с CUDA (compute capability 7.5+)
          - Драйверы NVIDIA (через NVIDIA App)

          При первом запуске модели загрузятся автоматически.

          ## Структура

          ```
          koharu.exe  - исполняемый файл
          ui/         - веб-интерфейс
          ```
          EOF
          cd dist
          7z a -tzip lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lilith-koharu-windows-x86_64
          path: dist/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lilith-koharu-linux-x86_64
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lilith-koharu-windows-x86_64
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Lilith Koharu ${{ steps.version.outputs.VERSION }}
          body: |
            ## Изменения

            - Обновление версии до ${{ steps.version.outputs.VERSION }}

            ## Загрузка

            | Платформа | Файл |
            |-----------|------|
            | Linux x86_64 | `lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz` |
            | Windows x86_64 | `lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip` |

            ## Требования

            - **GPU**: NVIDIA GPU с CUDA compute capability 7.5+ (опционально)
            - **Драйверы**: Последние драйверы NVIDIA

            При первом запуске модели загрузятся автоматически из Hugging Face.
          files: |
            artifacts/lilith-koharu-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz
            artifacts/lilith-koharu-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip
          draft: false
          prerelease: false
